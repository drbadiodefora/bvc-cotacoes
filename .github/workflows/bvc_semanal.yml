name: BVC - Cotações semanais

on:
  schedule:
    - cron: '0 6 * * 1'          # Segunda‑feira às 6h (Cabo Verde)
      timezone: "Atlantic/Cape_Verde"
  workflow_dispatch:

jobs:
  rodar-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4 wordpress-xmlrpc
      - name: Executar skill BVC
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python bvc_skill.py
