name: BVC - Cotações semanais

on:
  schedule:
    # 7:00 UTC corresponde às 6:00 de Cabo Verde (UTC-1)
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  rodar-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4 python-wordpress-xmlrpc
      - name: Executar skill BVC
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python bvc_skill.py
