name: BVC - Cotações semanais

on:
  schedule:
    - cron: '0 6 * * 1'
      timezone: "Atlantic/Cape_Verde"
  workflow_dispatch:

jobs:
  rodar-script:
    runs-on: ubuntu-latest
    steps:
      - name: Obter código do repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v5    # ← versão correta
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 python-wordpress-xmlrpc

      - name: Executar skill BVC
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python bvc_skill.py
